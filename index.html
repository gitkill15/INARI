<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INARI Beauty Salon</title>

    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        :root {
            --gold: #d4af37;
            --gold-light: #f0d060;
            --black: #080808;
            --surface: #111010;
            --surface2: #181615;
            --text-dim: #9a8a6a;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background: var(--black);
            color: var(--gold);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            overflow-x:hidden;
            font-family:'Poppins',sans-serif;
        }

        /* Background Glow Particles */

        .bg-canvas{
            position:fixed;
            inset:0;
            overflow:hidden;
            z-index:0;
            pointer-events:none;
        }

        .particle{
            position:absolute;
            border-radius:50%;
            background: radial-gradient(circle,
            rgba(212,175,55,0.35) 0%,
            transparent 70%);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp{
            0%{
                transform:translateY(100vh) scale(0);
                opacity:0;
            }

            10%{
                opacity:1;
            }

            100%{
                transform:translateY(-10vh) scale(1.2);
                opacity:0;
            }
        }

        /* Card */

        .card{
            position:relative;
            z-index:2;
            width:100%;
            max-width:420px;

            background:linear-gradient(
                160deg,
                var(--surface2),
                var(--surface)
            );

            border:1px solid rgba(212,175,55,0.2);
            border-radius:30px;

            padding:50px 24px;

            text-align:center;

            box-shadow:
                0 0 0 1px rgba(212,175,55,0.05),
                0 25px 80px rgba(0,0,0,0.85),
                0 0 60px rgba(212,175,55,0.05) inset;

            animation:cardReveal 0.8s ease;
        }

        @keyframes cardReveal{
            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* Decorative Gold Lines */

        .card::before,
        .card::after{
            content:'';
            position:absolute;
            left:50%;
            transform:translateX(-50%);
            height:1px;

            background:linear-gradient(
                90deg,
                transparent,
                var(--gold),
                transparent
            );
        }

        .card::before{
            top:0;
            width:60%;
        }

        .card::after{
            bottom:0;
            width:40%;
        }

        /* Logo */

        .logo-wrap{
            position:relative;
            display:inline-block;
            margin-bottom:28px;
        }

        .logo-ring{
            position:absolute;
            inset:-10px;
            border-radius:50%;
            border:1.5px solid rgba(212,175,55,0.3);
            animation:spin 8s linear infinite;
        }

        .logo-ring-outer{
            position:absolute;
            inset:-18px;
            border-radius:50%;
            border:1px solid rgba(212,175,55,0.15);
            animation:spin 14s linear infinite reverse;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }

        .logo{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            display:block;
        }

        .logo-fallback{
            width:120px;
            height:120px;
            border-radius:50%;

            background:linear-gradient(
                135deg,
                #1a1710,
                #0d0c09
            );

            display:flex;
            align-items:center;
            justify-content:center;

            font-family:'Montserrat',sans-serif;
            font-size:34px;
            font-weight:700;

            color:var(--gold);
        }

        /* Heading */

        .salon-name{
            font-family:'Montserrat',sans-serif;
            font-size:28px;
            font-weight:800;
            letter-spacing:4px;
            color:var(--gold-light);
            text-transform:uppercase;
            line-height:1.2;
        }

        .salon-name span{
            display:block;
            margin-top:8px;

            font-size:12px;
            font-weight:300;
            letter-spacing:3px;

            color:var(--text-dim);
        }

        /* Divider */

        .divider{
            display:flex;
            align-items:center;
            gap:12px;
            margin:22px 0 30px;
        }

        .divider-line{
            flex:1;
            height:1px;
            background:rgba(212,175,55,0.3);
        }

        .divider-diamond{
            width:6px;
            height:6px;
            background:var(--gold);
            transform:rotate(45deg);
        }

        /* Buttons */

        .btn-group{
            display:flex;
            flex-direction:column;
            gap:16px;
        }

        .btn{
            position:relative;

            display:flex;
            align-items:center;
            justify-content:center;
            gap:14px;

            padding:18px;

            border-radius:16px;
            text-decoration:none;

            overflow:hidden;

            font-family:'Montserrat',sans-serif;
            font-size:13px;
            font-weight:700;
            letter-spacing:2px;
            text-transform:uppercase;

            transition:0.3s ease;
        }

        .btn-bg{
            position:absolute;
            inset:0;

            background:linear-gradient(
                135deg,
                #c9a227,
                #f0d060,
                #c9a227
            );

            z-index:0;
        }

        .btn-outline .btn-bg{
            background:transparent;
            border:1.5px solid rgba(212,175,55,0.4);
        }

        .btn-text,
        .btn-icon{
            position:relative;
            z-index:1;
        }

        .btn-icon img{
            width:22px;
            height:22px;
            object-fit:contain;
            display:block;
        }

        .btn:not(.btn-outline){
            color:black;
        }

        .btn-outline{
            color:var(--gold-light);
        }

        .btn:hover{
            transform:translateY(-3px) scale(1.02);

            box-shadow:
                0 10px 30px rgba(212,175,55,0.25);
        }

        /* Footer */

        .footer{
            margin-top:30px;
        }

        .footer-text{
            color:var(--text-dim);
            font-size:13px;
            letter-spacing:2px;
            font-style:italic;
        }

        /* Mobile */

        @media(max-width:480px){

            .card{
                border-radius:24px;
                padding:45px 20px;
            }

            .salon-name{
                font-size:24px;
            }

        }

    </style>
</head>

<body>

<!-- Background -->

<div class="bg-canvas" id="bgCanvas"></div>

<!-- Main Card -->

<div class="card">

    <!-- Logo -->

    <div class="logo-wrap">

        <div class="logo-ring-outer"></div>
        <div class="logo-ring"></div>

        <!-- Put logo.jpeg in same folder -->

        <img
            src="logo.jpeg"
            alt="INARI Beauty Salon"
            class="logo"

            onerror="
                this.style.display='none';
                document.getElementById('logoFallback').style.display='flex';
            "
        >

        <div
            class="logo-fallback"
            id="logoFallback"
            style="display:none;"
        >
            IB
        </div>

    </div>

    <!-- Heading -->

    <h1 class="salon-name">
        INARI BEAUTY SALON
        <span>Vizag</span>
    </h1>

    <!-- Divider -->

    <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line"></div>
    </div>

    <!-- Buttons -->

    <div class="btn-group">

        <!-- Instagram -->

        <a
            href="https://www.instagram.com/inaribeautysalonvizag/"
            class="btn"
            target="_blank"
        >
            <div class="btn-bg"></div>

            <span class="btn-icon">
                <img
                    src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"
                    alt="Instagram"
                >
            </span>

            <span class="btn-text">
                Instagram
            </span>
        </a>

        <!-- Google -->

        <a
            href="https://www.google.com/search?q=INARI+Beauty+Salon+Reviews"
            class="btn btn-outline"
            target="_blank"
        >
            <div class="btn-bg"></div>

            <span class="btn-icon">
                <img
                    src="https://cdn-icons-png.flaticon.com/512/300/300221.png"
                    alt="Google"
                >
            </span>

            <span class="btn-text">
                Leave a Review
            </span>
        </a>

        <!-- YouTube -->

        <a
            href="https://www.youtube.com/@inaribeautysalon"
            class="btn"
            target="_blank"
        >
            <div class="btn-bg"></div>

            <span class="btn-icon">
                <img
                    src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"
                    alt="YouTube"
                >
            </span>

            <span class="btn-text">
                YouTube
            </span>
        </a>

    </div>

    <!-- Footer -->

    <div class="footer">
        <p class="footer-text">
            Thank you for visiting ✦
        </p>
    </div>

</div>

<script>

    // Background particles

    const canvas = document.getElementById('bgCanvas');

    for(let i=0;i<16;i++){

        const p = document.createElement('div');

        p.classList.add('particle');

        const size = Math.random()*160 + 40;

        p.style.cssText = `
            width:${size}px;
            height:${size}px;
            left:${Math.random()*100}%;

            animation-duration:${Math.random()*18+14}s;
            animation-delay:${Math.random()*-20}s;

            opacity:${Math.random()*0.3+0.05};
        `;

        canvas.appendChild(p);
    }

</script>

</body>
</html>
