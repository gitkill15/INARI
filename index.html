<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INARI Beauty Salon</title>

<style>
:root{
    --gold:#d4af37;
    --gold-light:#f0d060;
    --black:#050505;
    --surface:#111010;
    --surface2:#181615;
    --text-dim:#9a8a6a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--black);
    color:var(--gold);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:16px;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

.bg-canvas{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

.particle{
    position:absolute;
    border-radius:50%;
    background:radial-gradient(circle, rgba(212,175,55,0.25), transparent 70%);
    animation:floatUp linear infinite;
    filter:blur(2px);
}

@keyframes floatUp{
    0%{ transform:translateY(100vh) scale(0); opacity:0; }
    10%{ opacity:1; }
    100%{ transform:translateY(-10vh) scale(1.2); opacity:0; }
}

/* ── Card ── */
.card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:400px;
    background:linear-gradient(160deg,var(--surface2),var(--surface));
    border:1px solid rgba(212,175,55,0.15);
    border-radius:28px;
    padding:36px 20px 32px;
    text-align:center;
    box-shadow:
        0 25px 100px rgba(0,0,0,0.9),
        0 0 80px rgba(212,175,55,0.04) inset;
}

/* ── Logo ── */
.logo-wrap{
    position:relative;
    display:inline-block;
    margin-bottom:24px;
}

.logo-ring{
    position:absolute;
    inset:-10px;
    border-radius:50%;
    border:1px solid rgba(212,175,55,0.25);
    animation:spin 8s linear infinite;
}

.logo-ring-outer{
    position:absolute;
    inset:-18px;
    border-radius:50%;
    border:1px solid rgba(212,175,55,0.1);
    animation:spin 14s linear infinite reverse;
}

@keyframes spin{ to{ transform:rotate(360deg); } }

.logo{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    /* removes any white fringe from the jpeg on dark bg */
    mix-blend-mode:luminosity;
    display:block;
}

/* ── Name ── */
.salon-name{
    font-size:26px;
    font-weight:700;
    letter-spacing:4px;
    color:var(--gold-light);
    text-transform:uppercase;
}

.salon-name span{
    display:block;
    margin-top:8px;
    font-size:12px;
    letter-spacing:4px;
    color:var(--text-dim);
}

/* ── Divider ── */
.divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:22px 0 28px;
}

.divider-line{
    flex:1;
    height:1px;
    background:rgba(212,175,55,0.25);
}

.divider-diamond{
    width:6px;
    height:6px;
    background:var(--gold);
    transform:rotate(45deg);
}

/* ── Buttons ── */
.btn-group{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.btn{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px 20px;
    border-radius:16px;
    text-decoration:none;
    overflow:hidden;
    font-size:13px;
    font-weight:700;
    letter-spacing:3px;
    text-transform:uppercase;
    /* tap highlight */
    -webkit-tap-highlight-color:transparent;
}

.btn-bg{
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,#c9a227,#e6c547,#c9a227);
    z-index:0;
}

.btn-outline .btn-bg{
    background:transparent;
    border:1px solid rgba(212,175,55,0.25);
}

.btn-icon{
    position:absolute;
    left:22px;
    z-index:1;
    display:flex;
    align-items:center;
    justify-content:center;
    /* strip white background from PNG icons on dark/gold surface */
    mix-blend-mode:multiply;
}

/* On the gold (filled) buttons, multiply works fine.
   On the outline (dark) button the icon needs to be light — invert it. */
.btn-outline .btn-icon{
    mix-blend-mode:normal;
    filter:brightness(0) invert(1) opacity(0.75);
}

.btn-icon img{
    width:20px;
    height:20px;
    object-fit:contain;
    display:block;
}

.btn-text{
    position:relative;
    z-index:1;
}

.btn:not(.btn-outline){ color:black; }
.btn-outline{ color:var(--gold-light); }

/* ── Footer ── */
.footer{
    margin-top:28px;
}

.footer-text{
    color:var(--text-dim);
    font-size:12px;
    font-style:italic;
}

/* ── Responsive: very small screens (≤360px) ── */
@media(max-width:360px){
    .card{ padding:28px 14px 24px; border-radius:22px; }
    .logo{ width:88px; height:88px; }
    .salon-name{ font-size:21px; letter-spacing:3px; }
    .btn{ font-size:11px; letter-spacing:2px; padding:15px 16px; }
    .btn-icon{ left:16px; }
}
</style>
</head>
<body>

<div class="bg-canvas" id="bgCanvas"></div>

<div class="card">
    <div class="logo-wrap">
        <div class="logo-ring-outer"></div>
        <div class="logo-ring"></div>
        <img src="logo.jpeg" alt="INARI" class="logo">
    </div>

    <h1 class="salon-name">
        INARI BEAUTY SALON
        <span>VIZAG</span>
    </h1>

    <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line"></div>
    </div>

    <div class="btn-group">
        <a href="https://www.instagram.com/inaribeautysalonvizag/" class="btn" target="_blank">
            <div class="btn-bg"></div>
            <span class="btn-icon">
                <img src="instagram.png" alt="Instagram">
            </span>
            <span class="btn-text">INSTAGRAM</span>
        </a>

        <a href="https://www.google.com/search?q=INARI+Beauty+Salon+Reviews" class="btn btn-outline" target="_blank">
            <div class="btn-bg"></div>
            <span class="btn-icon">
                <img src="google.png" alt="Google">
            </span>
            <span class="btn-text">LEAVE A REVIEW</span>
        </a>

        <a href="https://www.youtube.com/@inaribeautysalon" class="btn" target="_blank">
            <div class="btn-bg"></div>
            <span class="btn-icon">
                <img src="youtube.png" alt="YouTube">
            </span>
            <span class="btn-text">YOUTUBE</span>
        </a>
    </div>

    <div class="footer">
        <p class="footer-text">Thank you for visiting ✦</p>
    </div>
</div>

<script>
const canvas=document.getElementById('bgCanvas');
for(let i=0;i<16;i++){
    const p=document.createElement('div');
    p.classList.add('particle');
    const size=Math.random()*140+40;
    p.style.cssText=`
        width:${size}px;
        height:${size}px;
        left:${Math.random()*100}%;
        animation-duration:${Math.random()*18+14}s;
        animation-delay:${Math.random()*-20}s;
        opacity:${Math.random()*0.25+0.05};
    `;
    canvas.appendChild(p);
}
</script>

</body>
</html>
