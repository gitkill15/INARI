<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INARI Beauty Salon</title>

<style>
:root{
    --gold:#d4af37;
    --gold-light:#f0d060;
    --black:#080808;
    --surface:#111010;
    --surface2:#181615;
    --text-dim:#9a8a6a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--black);
    color:var(--gold);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

.bg-canvas{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

.particle{
    position:absolute;
    border-radius:50%;
    background:radial-gradient(circle, rgba(212,175,55,0.35), transparent 70%);
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    0%{
        transform:translateY(100vh) scale(0);
        opacity:0;
    }
    10%{
        opacity:1;
    }
    100%{
        transform:translateY(-10vh) scale(1.2);
        opacity:0;
    }
}

.card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:420px;
    background:linear-gradient(160deg,var(--surface2),var(--surface));
    border:1px solid rgba(212,175,55,0.2);
    border-radius:30px;
    padding:50px 24px;
    text-align:center;
    box-shadow:
        0 25px 80px rgba(0,0,0,0.85),
        0 0 60px rgba(212,175,55,0.05) inset;
}

.logo-wrap{
    position:relative;
    display:inline-block;
    margin-bottom:28px;
}

.logo-ring{
    position:absolute;
    inset:-10px;
    border-radius:50%;
    border:1.5px solid rgba(212,175,55,0.3);
    animation:spin 8s linear infinite;
}

.logo-ring-outer{
    position:absolute;
    inset:-18px;
    border-radius:50%;
    border:1px solid rgba(212,175,55,0.15);
    animation:spin 14s linear infinite reverse;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
}

.salon-name{
    font-size:28px;
    font-weight:bold;
    letter-spacing:4px;
    color:var(--gold-light);
    text-transform:uppercase;
}

.salon-name span{
    display:block;
    margin-top:8px;
    font-size:12px;
    letter-spacing:3px;
    color:var(--text-dim);
}

.divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:22px 0 30px;
}

.divider-line{
    flex:1;
    height:1px;
    background:rgba(212,175,55,0.3);
}

.divider-diamond{
    width:6px;
    height:6px;
    background:var(--gold);
    transform:rotate(45deg);
}

.btn-group{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.btn{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:16px;
    padding:18px 22px;
    border-radius:16px;
    text-decoration:none;
    overflow:hidden;
    font-size:13px;
    font-weight:bold;
    letter-spacing:2px;
    text-transform:uppercase;
    transition:0.3s;
}

.btn-bg{
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,#c9a227,#f0d060,#c9a227);
    z-index:0;
}

.btn-outline .btn-bg{
    background:transparent;
    border:1.5px solid rgba(212,175,55,0.4);
}

.btn-text,
.btn-icon{
    position:relative;
    z-index:1;
}

.btn-icon{
    background:transparent;
    display:flex;
    align-items:center;
    justify-content:center;
}

.btn-icon img{
    width:28px;
    height:28px;
    object-fit:contain;
    display:block;
}

.btn:not(.btn-outline){
    color:black;
}

.btn-outline{
    color:var(--gold-light);
}

.btn:hover{
    transform:translateY(-3px) scale(1.02);
    box-shadow:0 10px 30px rgba(212,175,55,0.25);
}

.footer{
    margin-top:30px;
}

.footer-text{
    color:var(--text-dim);
    font-size:13px;
    font-style:italic;
}

@media(max-width:480px){
    .card{
        padding:40px 18px;
    }

    .salon-name{
        font-size:24px;
    }

    .btn{
        padding:16px 18px;
    }
}
</style>
</head>
<body>

<div class="bg-canvas" id="bgCanvas"></div>

<div class="card">
    <div class="logo-wrap">
        <div class="logo-ring-outer"></div>
        <div class="logo-ring"></div>
        <img src="logo.jpeg" alt="INARI" class="logo">
    </div>

    <h1 class="salon-name">
        INARI BEAUTY
        <span>Luxury Salon · Vizag</span>
    </h1>

    <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line"></div>
    </div>

    <div class="btn-group">
        <a href="https://www.instagram.com/inaribeautysalonvizag/" class="btn" target="_blank">
            <div class="btn-bg"></div>
            <span class="btn-icon">
                <img src="instagram.png" alt="Instagram">
            </span>
            <span class="btn-text">Instagram</span>
        </a>

        <a href="https://www.google.com/search?q=INARI+Beauty+Salon+Reviews" class="btn btn-outline" target="_blank">
            <div class="btn-bg"></div>
            <span class="btn-icon">
                <img src="google.png" alt="Google">
            </span>
            <span class="btn-text">Leave Review</span>
        </a>

        <a href="https://www.youtube.com/@inaribeautysalon" class="btn" target="_blank">
            <div class="btn-bg"></div>
            <span class="btn-icon">
                <img src="youtube.png" alt="YouTube">
            </span>
            <span class="btn-text">YouTube</span>
        </a>
    </div>

    <div class="footer">
        <p class="footer-text">Thank you for visiting ✦</p>
    </div>
</div>

<script>
const canvas=document.getElementById('bgCanvas');

for(let i=0;i<16;i++){
    const p=document.createElement('div');
    p.classList.add('particle');

    const size=Math.random()*160+40;

    p.style.cssText=`
        width:${size}px;
        height:${size}px;
        left:${Math.random()*100}%;
        animation-duration:${Math.random()*18+14}s;
        animation-delay:${Math.random()*-20}s;
        opacity:${Math.random()*0.3+0.05};
    `;

    canvas.appendChild(p);
}
</script>

</body>
</html>
